<!DOCTYPE html>
<html>
<head>
<title>HPedia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

.container{
  max-width:520px;
  margin:auto;
  padding:25px 20px;
  text-align:center;
}

.header{
  background:radial-gradient(circle at top, rgba(74,222,128,0.15), transparent);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}

.header::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(74,222,128,0.2), transparent 60%);
  top:-50%;
  left:-50%;
  animation:glowMove 8s linear infinite;
}

@keyframes glowMove{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

/* LOGO */
.logo{
  font-size:28px;
  font-weight:700;
  position:relative;
  display:inline-block;
  background:linear-gradient(90deg,#4ade80,#22c55e,#4ade80);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 3s linear infinite;
}

.logo::after{
  content:"HPedia";
  position:absolute;
  left:0;
  top:0;
  z-index:-1;
  color:#4ade80;
  filter:blur(8px);
  opacity:0.6;
}

@keyframes shine{
  0%{background-position:0% center;}
  100%{background-position:200% center;}
}

.tagline{font-size:13px;opacity:0.8;margin-bottom:10px;}
h1{font-size:26px;margin:10px 0;}

.highlight{
  background:rgba(74,222,128,0.1);
  padding:12px;
  border-radius:12px;
  font-size:13px;
  margin-bottom:15px;
}

.btn{
  width:100%;
  padding:15px;
  border-radius:14px;
  margin-top:10px;
  border:none;
  font-size:15px;
  cursor:pointer;
  font-weight:600;
}

.wa{background:#25D366;color:white;}
.secondary{background:rgba(255,255,255,0.1);color:white;}
.ig{background:#000;color:white;}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  padding:14px;
  margin-top:10px;
}

.dropdown{
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

.content{display:none;}
.open{display:block;}

.item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:8px;
  margin-top:6px;
  text-align:left;
  font-size:13px;
  cursor:pointer;
}

.footer{
  margin-top:30px;
  font-size:12px;
  opacity:0.7;
}

.floating{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:16px;
  border-radius:50%;
  cursor:pointer;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">HPedia</div>
<div class="tagline">Spesialis Jual Beli HP Bekas • Jabodetabek</div>

<h1>Jual HP Anda dengan Cepat & Aman</h1>

<div class="highlight">
📍 Jabodetabek <br>
💰 Harga menyesuaikan kondisi
</div>

<button class="btn wa" onclick="wa()">
<i class="fa-brands fa-whatsapp"></i> Cairkan Sekarang
</button>

<button class="btn secondary" onclick="scrollHarga()">
📊 Cek Estimasi Harga
</button>

<button class="btn ig" onclick="ig()">
<i class="fa-brands fa-instagram"></i> @hpedia_id
</button>

</div>

<div id="harga"></div>
<div id="list"></div>

<div class="footer">
📞 0881-0243-32195<br>
📍 Jabodetabek
</div>

</div>

<div class="floating" onclick="wa()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<script>

fetch("data.json")
.then(res => res.json())
.then(data => {

  const list = document.getElementById("list");

  for(let brand in data){
    let el = document.createElement("div");

    el.innerHTML = `
      <div class="card dropdown" onclick="this.nextElementSibling.classList.toggle('open')">
        ${brand} <span>+</span>
      </div>
      <div class="content">
        ${data[brand].map(i=>`
          <div class="item" onclick="waItem('${i}')">
            ${i}
          </div>
        `).join("")}
      </div>
    `;

    list.appendChild(el);
  }

});

/* 🔥 FIX CLICK */

function wa(){
  window.open("https://wa.me/62881024332195","_blank");
}

function ig(){
  window.open("https://instagram.com/hpedia_id","_blank");
}

function scrollHarga(){
  window.scrollTo({
    top: document.getElementById("harga").offsetTop - 20,
    behavior:"smooth"
  });
}

function waItem(nama){
  let text = encodeURIComponent("Halo, saya mau jual " + nama);
  window.open("https://wa.me/62881024332195?text=" + text,"_blank");
}

</script>

</body>
</html>
